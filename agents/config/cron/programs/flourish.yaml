# Flourish-specific BBH cron config. Global defaults live in ../defaults.yaml.
programs:
  flourish:
    platform: bugcrowd
    state: active
    family: web_bounty
    default_lane: web
    smart_fuzzing:
      enabled: true
      ai:
        enabled: true
        mode: evidence_pack_only
        # AI may rank/synthesize sanitized Katana, JS, proxy, and docs evidence.
        # It cannot change scope, target choice, rate, tool command, or auth mode.
      lanes:
        web:
          enabled: true
          ai:
            enabled: true
            mode: evidence_pack_only
    schedule:
      days: weekdays
    scope:
      source: ~/Shared/scopes/<program>/
      in_scope_file: ~/Shared/scopes/<program>/in-scope.txt
      assets_file: ~/Shared/scopes/<program>/assets.json
      rules_file: ~/Shared/scopes/<program>/rules-of-engagement.json
      fail_closed: true
      notes:
      - '*.flourish.studio is authorized by the saved wildcard scope; explicit
        target entries remain required for automatic selection.'
      - training.flourish.studio is out of scope.
      - Rate-limit testing and DoS are blocked by program policy.
    runtime:
      # One selector for the entire web run: off, blue, or another owned account alias/color.
      auth: blue
    targets:
      flourish_app:
        lane: web
        base_urls:
        - https://app.flourish.studio/
      flourish_home:
        lane: web
        base_urls:
        - https://flourish.studio/
      flo_uri:
        lane: web
        base_urls:
        - https://flo.uri.sh
      xyzbmojn:
        lane: web
        base_urls:
        - https://xyzbmojn.net/
      user_templates:
        lane: web
        base_urls:
        - https://flourish-user-templates.com
      user_preview:
        lane: web
        base_urls:
        - https://flourish-user-preview.com
      kiln:
        lane: web
        base_urls:
        - https://*.kiln.it
    target_selection:
      strategy: recon_ry_ranked_agent_selected_queue
      default_target: flourish_home
      queue_file: ~/Shared/web_bounty/<program>/web/recon/cron/_meta/juicy_targets.jsonl
      agent_review:
        # Optional bounded AI/analyst handoff. An external process may write the
        # response_file JSON with selected_target (a pre-ranked scoped candidate),
        # reason, and wordlist_groups. The orchestrator never executes AI-provided
        # commands and falls back to deterministic ranking on invalid/missing input.
        enabled: true
        mode: structured_response_file
        response_file: ~/Shared/web_bounty/<program>/web/recon/cron/_meta/agent_review.json
        top_n: 25
        select_n: 1
        require_reason: true
      ranking_inputs:
      - ~/Shared/bounty_recon/<program>/alive.txt
      - ~/Shared/bounty_recon/<program>/urls.txt
      - ~/Shared/bounty_recon/<program>/params.txt
      - ~/Shared/bounty_recon/<program>/jsfiles.txt
      - ~/Shared/bounty_recon/<program>/dirs.txt
      - ~/Shared/bounty_recon/<program>/history/
      - ~/Shared/web_bounty/<program>/web/recon/url_index/url_index.sqlite
      - ~/Shared/web_bounty/<program>/web/recon/aggregated/
      - ~/Shared/web_bounty/<program>/web/recon/map/
      - ~/Shared/web_bounty/<program>/web/recon/maps/map.jsonl
      - ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.jsonl
      - ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.txt
      - ~/Shared/web_bounty/<program>/web/recon/queues/nmap_http_fuzz.jsonl
      - ~/Shared/web_bounty/<program>/web/recon/fuzz_history/fuzz_runs.jsonl
      ranking_signals:
      - api_dev_staging_admin_hostnames
      - sensitive_word_hits
      - recon_ry_tech_fingerprints
      - swagger_openapi_graphql
      - 401_403_405_boundaries
      - unusual_status_or_size_clusters
      - js_discovered_routes
      - naabu_nonstandard_http_ports
      - nmap_service_hints
      - prior_fuzz_hits
      - untested_in_url_ingest
      - untested_wordlist_mode_pair
    auth:
      allow_stored_auth: true
      allow_ryushe_proxy_refresh: true
      default_account: blue
      allowed_pwnfox_colors:
      - blue
      resolver:
        command_template:
        - python3
        - skills/account-management/scripts/auth_resolver.py
        - resolve
        - --program
        - <program>
        - --account
        - blue
        - --target-url
        - <selected-base-url>
        - --host-filter
        - <selected-host>
        proxy_refresh_template:
        - python3
        - skills/account-management/scripts/auth_resolver.py
        - refresh-from-ryushe-proxy
        - --program
        - <program>
        - --account
        - blue
        - --host-filter
        - <selected-host>
      pwnfox:
        header: X-PwnFox-Color
        color: blue
    jobs:
      naabu_discovery:
        state: manual_review_required
        cadence: scheduled
        days: inherit
        slot: nightly_2200
        local_time: '21:15'
        tool: naabu
        job_family: port_discovery
        target: inherit_target_selection
        lane: web
        mode: aggregated_domain_common_port_discovery
        inputs:
          # Naabu is the first-pass common-port signal over canonical program aggregates.
          ports: 80,443,8080,8443,3000,5000,8000,8081,8888,9000
          require_saved_scope: true
          target_source: aggregated_domain_sources
          aggregated_domain_sources:
          - ~/Shared/web_bounty/<program>/web/recon/aggregated/alive.txt
          - ~/Shared/web_bounty/<program>/web/recon/aggregated/urls.txt
          source_first: true
          batch_candidate_limit: 25
        rate_limit:
          scope: host
          desired_pps: 100
          collision_policy: one_service_discovery_job_per_host
        command_template:
        - naabu
        - -list
        - <naabu-hosts-file>
        - -p
        - <naabu-ports>
        - -json
        - -rate
        - <effective-rate>
        - -o
        - <run-root>/raw/naabu.jsonl
        outputs:
          run_root: ~/Shared/web_bounty/<program>/web/recon/tools/naabu/runs/<YYYY-MM-DD>/<run-id>/
          normalized_ports_jsonl: ~/Shared/web_bounty/<program>/web/recon/tools/naabu/runs/<YYYY-MM-DD>/<run-id>/normalized/ports.jsonl
          normalized_ports_txt: ~/Shared/web_bounty/<program>/web/recon/tools/naabu/runs/<YYYY-MM-DD>/<run-id>/normalized/ports.txt
          aggregated_ports_jsonl: ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.jsonl
          aggregated_ports_txt: ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.txt
        post_run:
          normalize_ports: true
          append_to_aggregated_ports: true
          feed_nmap_enrichment: true
        stop_policy:
          unknown_scope: fail_closed
      nmap_enrichment:
        state: manual_review_required
        cadence: scheduled
        days: inherit
        slot: nightly_2200
        local_time: '21:30'
        tool: nmap
        job_family: service_enrichment
        target: inherit_target_selection
        lane: web
        mode: full_range_enrichment_after_unusual_naabu_port
        inputs:
          naabu_ports:
          - ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.jsonl
          - ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.txt
          scan_all_ports_for_interesting_hosts: true
          interesting_ports_only: true
          common_web_ports: [80, 443]
          require_saved_scope: true
          max_hosts_per_run: 3
          max_ports_per_host: 20
        command_template:
        - nmap
        - -sV
        - --version-light
        - -Pn
        - -T2
        - --stats-every
        - 10m
        - -p-
        - -oA
        - <run-root>/raw/nmap
        - <selected-host>
        outputs:
          run_root: ~/Shared/web_bounty/<program>/web/recon/tools/nmap/runs/<YYYY-MM-DD>/<run-id>/
          aggregated_ports_jsonl: ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.jsonl
          aggregated_ports_txt: ~/Shared/web_bounty/<program>/web/recon/aggregated/ports.txt
          fuzz_endpoint_queue: ~/Shared/web_bounty/<program>/web/recon/queues/nmap_http_fuzz.jsonl
          parameter_endpoint_queue: ~/Shared/web_bounty/<program>/web/recon/queues/nmap_http_parameters.txt
        post_run:
          normalize_ports: true
          append_to_aggregated_ports: true
          queue_http_followups: true
          generate_report: true
          report_path: ~/Shared/web_bounty/<program>/web/recon/cron/latest_summary.md
        notifications:
          progress_every_seconds: 600
        stop_policy:
          missing_naabu_output: skip_and_record
          no_discovered_ports: skip_and_record
          unknown_scope: fail_closed
      juicy_target_fuzz:
        state: manual_review_required
        cadence: scheduled
        days: inherit
        slot: nightly_2200
        local_time: '22:00'
        tool: ffuf
        job_family: fuzzing
        target: inherit_target_selection
        lane: web
        mode: unauthenticated
        active_profile: default
        profiles:
          default:
            desired_rps: 15
            max_duration_seconds: null
            checkpoint_every: 2000
            progress_every: 2h
            purpose: standard 15rps discovery pass
          long_run:
            desired_rps: 2
            max_duration_seconds: 28800
            checkpoint_every: 5000
            progress_every: 2h
            purpose: all-day low-rate broad discovery pass
        inputs:
          # Preserve raw evidence but reject a large fully-uniform response set as route leads.
          uniform_response_threshold: 10000
          # Select FFUF targets independently from evidence-gated HTTP service output.
          target_url_sources:
          - ~/Shared/web_bounty/<program>/web/recon/queues/nmap_http_fuzz.jsonl
        url_pattern: <selected-base-url>/FUZZ
        rate_limit:
          scope: host
          desired_rps: inherit_defaults_unauthenticated
          global_budget: defaults.rate_limit.global_http_rps
          collision_policy: split_evenly_by_normalized_host
        wordlists:
          strategy: catalog_smart_target_mapping
          compose_temporary: true
          catalog_roots:
          - /usr/share/wordlists
          - /home/ryushe/wordlists
          - ~/projects/ghost-wordlists/wordlists
          - ~/Shared/web_bounty/<program>/web/recon/wordlists/generated
          tech_sources:
          - ~/Shared/web_bounty/<program>/web/recon/recon-ry/flourish-auth-full-20260627/runs/2026-06-27/20260627T231208Z_18f8f690/raw/history/6-27-2026/.baseline/httpx.jsonl
          - ~/Shared/web_bounty/<program>/web/recon/recon-ry/flourish-auth-test-20260627/runs/2026-06-27/20260627T200550Z_6bcc3188/raw/history/6-27-2026/.baseline/httpx.jsonl
          - ~/Shared/web_bounty/<program>/web/recon/maps/map.jsonl
          - ~/Shared/bounty_recon/<program>/ghost/headers/cors-blue-20260701/summary.sanitized.json
          tech_wordlists:
            api:
            - /usr/share/wordlists/SecLists/Discovery/Web-Content/common-api-endpoints-mazen160.txt
            - /usr/share/wordlists/SecLists/Discovery/Web-Content/api/api-seen-in-wild.txt
            - /usr/share/wordlists/OneListForAll/dict/api_objects_short.txt
            - /usr/share/wordlists/OneListForAll/dict/api_actions_short.txt
            graphql:
            - /usr/share/wordlists/SecLists/Discovery/Web-Content/graphql.txt
            - /usr/share/wordlists/OneListForAll/dict/swagger_short.txt
            javascript:
            - /usr/share/wordlists/SecLists/Discovery/Web-Content/JavaScript-Miners.txt
          selection_signals:
          - selected_target_tech_stack
          - saved_header_or_httpx_evidence
          - selected_target_route_nouns
          - recon_ry_dirs
          - js_discovered_routes
          - nmap_service_hints
          - prior_fuzz_history
          - status_code_boundaries
          tier_limits:
            baseline_max_files: 3
            tech_specific_max_files: 3
            target_generated_max_files: 2
          include:
          - /usr/share/wordlists/SecLists/Discovery/Web-Content/common.txt
          - /usr/share/wordlists/SecLists/Discovery/Web-Content/raft-small-directories.txt
          - /usr/share/wordlists/SecLists/Discovery/Web-Content/raft-large-words-lowercase.txt
          - /usr/share/wordlists/SecLists/Discovery/Web-Content/combined_words.txt
          - /usr/share/wordlists/OneListForAll/dict/common-api-endpoints_short.txt
          - ~/Shared/web_bounty/<program>/web/recon/wordlists/generated/latest/routes.txt
          missing_wordlist_policy: skip_missing_and_record
        command_template:
        - ffuf
        - -u
        - <selected-base-url>/FUZZ
        - -w
        - <composed-wordlist>
        - -mc
        - 200,204,301,302,307,401,403,405,429,500
        - -fc
        - "404"
        - -ac
        - -rate
        - <effective-rate>
        - -json
        - -o
        - <run-root>/raw/ffuf.json
        outputs:
          run_root: ~/Shared/web_bounty/<program>/web/recon/tools/ffuf/runs/<YYYY-MM-DD>/<run-id>/
          fuzz_history: ~/Shared/web_bounty/<program>/web/recon/fuzz_history/fuzz_runs.jsonl
          status_leads: ~/Shared/web_bounty/<program>/web/recon/fuzz/status_leads.jsonl
          forbidden_leads: ~/Shared/web_bounty/<program>/web/recon/fuzz/403.jsonl
          url_ingest: ~/Shared/web_bounty/<program>/web/recon/url_index/url_index.sqlite
          map_store: ~/Shared/web_bounty/<program>/web/recon/map/
        post_run:
          write_fuzz_history: true
          write_status_leads: true
          write_403_leads: true
          feed_url_ingest: true
          update_map_store_summary: true
          generate_report: true
          report_path: ~/Shared/web_bounty/<program>/web/recon/cron/latest_summary.md
          handoff_403: true
          handoff_path: ~/Shared/web_bounty/<program>/web/recon/fuzz/403_handoff.md
        notifications:
          telegram_topic: fuzzing
          progress_every: 2h
          progress_every_seconds: 600
          on_finish: true
          on_failure: true
        stop_policy:
          inherit: defaults.status_policy
      authenticated_parameter_mining:
        state: manual_review_required
        cadence: scheduled
        days: inherit
        slot: nightly_2200
        local_time: '22:45'
        tool: arjun
        job_family: parameter_mining
        target: inherit_target_selection
        lane: web
        # Session selection is global at programs.<program>.runtime.auth.
        inputs:
          # params.txt is transformed into a selected-host, value-free Arjun URL queue per run.
          parameter_url_sources:
          - ~/Shared/web_bounty/<program>/web/recon/queues/nmap_http_parameters.txt
          - ~/Shared/web_bounty/<program>/web/recon/aggregated/params.txt
          - ~/Shared/bounty_recon/<program>/params.txt
          max_endpoints_per_run: 50
          endpoint_queue: ~/Shared/web_bounty/<program>/web/recon/parameter_mining/latest/queue/recon-hidden-param-patterns.txt
          fallback_endpoint_sources:
          - ~/Shared/web_bounty/<program>/web/recon/url_index/url_index.sqlite
          - ~/Shared/web_bounty/<program>/web/recon/aggregated/params.txt
          - ~/Shared/web_bounty/<program>/web/recon/aggregated/urls.txt
          - ~/Shared/web_bounty/<program>/web/recon/fuzz/status_leads.jsonl
          - ~/Shared/bounty_recon/<program>/params.txt
          - ~/Shared/bounty_recon/<program>/params_raw.txt
          - ~/Shared/bounty_recon/<program>/urls.txt
        command_template:
        - arjun
        - -i
        - <endpoint-queue>
        - -m
        - GET,POST
        - --rate-limit
        - <effective-rate>
        - --stable
        - -oJ
        - <run-root>/raw/arjun.json
        - -oT
        - <run-root>/raw/arjun.txt
        authenticated_headers_source:
          type: auth_resolver_reference
          secret_material_policy: local_only_never_prompt
        outputs:
          run_root: ~/Shared/web_bounty/<program>/web/recon/tools/arjun/runs/<YYYY-MM-DD>/<run-id>/
          parameter_mining_run: ~/Shared/web_bounty/<program>/web/recon/parameter_mining/<run-id>/
          parameters_jsonl: ~/Shared/web_bounty/<program>/web/recon/parameter_mining/<run-id>/parameters.jsonl
          aggregated_params: ~/Shared/web_bounty/<program>/web/recon/aggregated/params.txt
          parameter_source_log: ~/Shared/web_bounty/<program>/web/recon/parameter_mining/parameter_sources.jsonl
          url_ingest: ~/Shared/web_bounty/<program>/web/recon/url_index/url_index.sqlite
          map_store: ~/Shared/web_bounty/<program>/web/recon/map/
        post_run:
          normalize_arjun_output: true
          append_to_aggregated_params: true
          write_parameter_source_log: true
          feed_url_ingest: true
          update_map_store_summary: true
          generate_report: true
          report_path: ~/Shared/web_bounty/<program>/web/recon/cron/latest_summary.md
        notifications:
          telegram_topic: coding
          progress_every_seconds: 600
          on_finish: true
          on_failure: true
        stop_policy:
          inherit: defaults.status_policy
